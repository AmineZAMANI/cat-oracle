# Blueprint Render — un seul service : le backend FastAPI sert aussi le frontend
services:
  - type: web
    name: cat-oracle
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
